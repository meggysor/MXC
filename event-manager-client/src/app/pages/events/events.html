<app-header></app-header>

<div class="events-container">
  <div class="events-toolbar">
    <h1>Events</h1>
    <button mat-raised-button color="primary" (click)="onAddNew()">Add new event</button>
  </div>

  <div *ngIf="isLoading()" class="loading-overlay">
    <mat-spinner></mat-spinner>
  </div>

  <div class="table-scroll-wrapper">
    <table *ngIf="hasLoaded()" mat-table [dataSource]="dataSource()" matSort (matSortChange)="onSortChange($event)" class="events-table">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
        <td mat-cell *matCellDef="let event">{{ event.name }}</td>
      </ng-container>

      <ng-container matColumnDef="location">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Place</th>
        <td mat-cell *matCellDef="let event">
          {{ event.location }}<span *ngIf="event.country">, <span class="country">{{ event.country }}</span></span>
        </td>
      </ng-container>

      <ng-container matColumnDef="capacity">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Capacity</th>
        <td mat-cell *matCellDef="let event">{{ event.capacity ? (event.capacity + ' ppl') : '-' }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let event">
          <button mat-button (click)="onEdit(event)">
            <mat-icon>edit</mat-icon> Edit
          </button>
          <button mat-button color="warn" (click)="onDelete(event)">
            <mat-icon>delete</mat-icon> Delete
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>

  <p *ngIf="hasLoaded() && dataSource().length === 0" class="empty-state">
    No events yet. Click "Add new event" to create one.
  </p>
</div>
